name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag selenium-tests:$(date +%s)

    - name: Run Selenium Tests
      run: docker run --rm selenium-tests:$(date +%s)
