stages:
  - test

run_selenium_tests:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_DRIVER: overlay2
  script:
    - docker build -t selenium-tests .
    - docker run --rm selenium-tests
  allow_failure: false
